fuente:
  tipo: "pantalla"                # "video" | "pantalla" | "ventana" (PrintWindow puede lavar contraste)
  titulo_ventana: "Euro Truck Simulator 2"
  ruta_video: "datos/videos/ets2_volvo_fh16.f299.mp4"
  monitor: 0
  region: null
  escalar_a: [1920, 1080]         # redimensiona a 1920x1080 para coincidir con ROI calibradas

modelo:
  pesos: "datos/modelos/yolo11n.pt"   # RF-03: sustituye yolo26n.pt (pendiente); yolo11n es COCO-compatible
  imgsz: 864
  conf_min: 0.35
  device: "cuda"

control:
  tipo: "gamepad"                 # "nulo" | "gamepad" | "teclado"

velocidad_dashboard:
  max_kmh_norm: 90.0              # km/h que equivale a velocidad normalizada 1.0
  retener_frames: 15              # mantener ultima lectura si un frame no se puede leer

seguridad:
  tecla_paro: "f12"
  timeout_watchdog_ms: 30000

registro:
  ruta_base: "datos/evidencia"
  grabar_video: true
  fps_objetivo: 30
